# Environnement de développement local Kinhale
# Usage : docker compose -f infra/docker/docker-compose.yml up -d --build
# Compatible Coolify (production)

services:
  postgres:
    image: postgres:16-alpine
    container_name: kinhale_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kinhale_dev
      POSTGRES_USER: kinhale
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kinhale_dev_secret}
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kinhale -d kinhale_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kinhale_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-kinhale_redis_dev}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-kinhale_redis_dev}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: kinhale_mailpit
    restart: unless-stopped
    ports:
      - '1027:1025'
      - '8027:8025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  minio:
    image: minio/minio:latest
    container_name: kinhale_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kinhale}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kinhale_minio_dev}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: kinhale_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://kinhale:${POSTGRES_PASSWORD:-kinhale_dev_secret}@postgres:5432/kinhale_dev
      REDIS_URL: redis://:${REDIS_PASSWORD:-kinhale_redis_dev}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-minimum-32-characters-long-for-local-testing}
      PSEUDO_ID_PEPPER: ${PSEUDO_ID_PEPPER:-dev-pseudo-id-pepper-minimum-32-characters-long}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 14d
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      MAIL_FROM: no-reply@kinhale.health
      WEB_URL: http://localhost:3000
    ports:
      - '3002:3002'
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../packages:/app/packages
      - api_node_modules:/app/node_modules
      - api_api_node_modules:/app/apps/api/node_modules

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: kinhale_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3002
    ports:
      - '3000:3000'
    volumes:
      - ../../apps/web:/app/apps/web
      - ../../packages:/app/packages
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/apps/web/.next

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_node_modules:
  api_api_node_modules:
  web_node_modules:
  web_next_cache:

networks:
  default:
    name: kinhale_dev
