<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kinhale — Partage medecin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Inter:wght@400;500;600&family=Source+Serif+4:wght@400;500;600&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Kinhale design tokens — clinical-calm */
      :root {
        --k-bg: oklch(98.5% 0.005 90);
        --k-surface: oklch(100% 0 0);
        --k-surface-2: oklch(96.5% 0.006 90);
        --k-line: oklch(90% 0.008 90);
        --k-line-strong: oklch(82% 0.01 90);

        --k-ink: oklch(22% 0.012 250);
        --k-ink-2: oklch(38% 0.012 250);
        --k-ink-3: oklch(55% 0.012 250);
        --k-ink-4: oklch(70% 0.012 250);

        /* Maintenance (routine, fond) */
        --k-maint: oklch(56% 0.07 235);
        --k-maint-soft: oklch(94% 0.025 235);
        --k-maint-ink: oklch(38% 0.08 235);

        /* Rescue (secours) */
        --k-rescue: oklch(58% 0.115 35);
        --k-rescue-soft: oklch(94% 0.03 35);
        --k-rescue-ink: oklch(40% 0.12 35);

        /* Amber (alerts) */
        --k-amber: oklch(72% 0.115 75);
        --k-amber-soft: oklch(95% 0.035 75);
        --k-amber-ink: oklch(48% 0.1 75);

        /* Confirmed / done */
        --k-ok: oklch(60% 0.09 155);
        --k-ok-soft: oklch(94% 0.03 155);

        /* Missed / passive */
        --k-miss: oklch(70% 0.005 250);
        --k-miss-soft: oklch(94% 0.005 250);

        --k-r-sm: 10px;
        --k-r-md: 14px;
        --k-r-lg: 20px;
        --k-r-xl: 28px;
      }

      [data-theme='dark'] {
        --k-bg: oklch(18% 0.012 250);
        --k-surface: oklch(22% 0.012 250);
        --k-surface-2: oklch(25% 0.012 250);
        --k-line: oklch(30% 0.012 250);
        --k-line-strong: oklch(38% 0.012 250);

        --k-ink: oklch(96% 0.005 90);
        --k-ink-2: oklch(80% 0.008 90);
        --k-ink-3: oklch(65% 0.01 90);
        --k-ink-4: oklch(50% 0.012 250);

        --k-maint: oklch(72% 0.085 235);
        --k-maint-soft: oklch(32% 0.04 235);
        --k-maint-ink: oklch(85% 0.08 235);

        --k-rescue: oklch(72% 0.12 35);
        --k-rescue-soft: oklch(32% 0.05 35);
        --k-rescue-ink: oklch(85% 0.11 35);

        --k-amber: oklch(82% 0.12 75);
        --k-amber-soft: oklch(32% 0.05 75);
        --k-amber-ink: oklch(85% 0.11 75);

        --k-ok: oklch(75% 0.1 155);
        --k-ok-soft: oklch(30% 0.04 155);

        --k-miss: oklch(55% 0.005 250);
        --k-miss-soft: oklch(28% 0.005 250);
      }

      /* Density */
      [data-density='compact'] {
        --k-pad: 12px;
        --k-gap: 10px;
        --k-row: 52px;
      }
      [data-density='regular'] {
        --k-pad: 16px;
        --k-gap: 14px;
        --k-row: 60px;
      }
      [data-density='roomy'] {
        --k-pad: 22px;
        --k-gap: 18px;
        --k-row: 72px;
      }

      /* Type families */
      [data-type='grotesk'] {
        --k-display: 'Inter Tight', 'Inter', system-ui, sans-serif;
        --k-text: 'Inter', system-ui, sans-serif;
        --k-mono: 'JetBrains Mono', ui-monospace, monospace;
        --k-display-tracking: -0.02em;
      }
      [data-type='serif'] {
        --k-display: 'Source Serif 4', Georgia, serif;
        --k-text: 'Inter', system-ui, sans-serif;
        --k-mono: 'JetBrains Mono', ui-monospace, monospace;
        --k-display-tracking: -0.01em;
      }
      [data-type='humanist'] {
        --k-display: 'DM Sans', system-ui, sans-serif;
        --k-text: 'DM Sans', system-ui, sans-serif;
        --k-mono: 'JetBrains Mono', ui-monospace, monospace;
        --k-display-tracking: -0.025em;
      }

      /* Layout style */
      [data-layout='cards'] .k-section {
        background: var(--k-surface);
        border-radius: var(--k-r-lg);
        padding: var(--k-pad);
        border: 0.5px solid var(--k-line);
      }
      [data-layout='cards'] .k-section + .k-section {
        margin-top: var(--k-gap);
      }

      [data-layout='flat'] .k-section {
        background: transparent;
        padding: var(--k-pad) var(--k-pad) 0;
      }
      [data-layout='flat'] .k-section + .k-section {
        border-top: 0.5px solid var(--k-line);
        margin-top: var(--k-gap);
        padding-top: var(--k-gap);
      }

      [data-layout='bento'] .k-section {
        background: var(--k-surface-2);
        border-radius: var(--k-r-md);
        padding: var(--k-pad);
      }
      [data-layout='bento'] .k-section + .k-section {
        margin-top: 8px;
      }

      .k-app {
        background: var(--k-bg);
        color: var(--k-ink);
        font-family: var(--k-text);
        font-feature-settings: 'ss01', 'cv11';
        -webkit-font-smoothing: antialiased;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .k-display {
        font-family: var(--k-display);
        letter-spacing: var(--k-display-tracking);
        font-weight: 500;
      }
      .k-mono {
        font-family: var(--k-mono);
      }
    </style>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #ebe8e2;
        height: 100%;
      }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        color: #1a1a1a;
      }
      * {
        box-sizing: border-box;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-name="design-canvas.jsx">
      // DesignCanvas.jsx — Figma-ish design canvas wrapper
      // Warm gray grid bg + Sections + Artboards + PostIt notes.
      // Artboards are reorderable (grip-drag), labels/titles are inline-editable,
      // and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
      // State persists to a .design-canvas.state.json sidecar via the host
      // bridge. No assets, no deps.
      //
      // Usage:
      //   <DesignCanvas>
      //     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
      //       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
      //       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
      //     </DCSection>
      //   </DesignCanvas>

      const DC = {
        bg: '#f0eee9',
        grid: 'rgba(0,0,0,0.06)',
        label: 'rgba(60,50,40,0.7)',
        title: 'rgba(40,30,20,0.85)',
        subtitle: 'rgba(60,50,40,0.6)',
        postitBg: '#fef4a8',
        postitText: '#5a4a2a',
        font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
      };

      // One-time CSS injection (classes are dc-prefixed so they don't collide with
      // the hosted design's own styles).
      if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
        const s = document.createElement('style');
        s.id = 'dc-styles';
        s.textContent = [
          '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
          '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
          '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
          '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
          '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
          '.dc-card{transition:box-shadow .15s,transform .15s}',
          '.dc-card *{scrollbar-width:none}',
          '.dc-card *::-webkit-scrollbar{display:none}',
          '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
          '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
          '.dc-grip:hover{background:rgba(0,0,0,.08)}',
          '.dc-grip:active{cursor:grabbing}',
          '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
          '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
          '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
          '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
          '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
          '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
          '[data-dc-slot]:hover .dc-expand{opacity:1}',
        ].join('\n');
        document.head.appendChild(s);
      }

      const DCCtx = React.createContext(null);

      // ─────────────────────────────────────────────────────────────
      // DesignCanvas — stateful wrapper around the pan/zoom viewport.
      // Owns runtime state (per-section order, renamed titles/labels, focused
      // artboard). Order/titles/labels persist to a .design-canvas.state.json
      // sidecar next to the HTML. Reads go via plain fetch() so the saved
      // arrangement is visible anywhere the HTML + sidecar are served together
      // (omelette preview, direct link, downloaded zip). Writes go through the
      // host's window.omelette bridge — editing requires the omelette runtime.
      // Focus is ephemeral.
      // ─────────────────────────────────────────────────────────────
      const DC_STATE_FILE = '.design-canvas.state.json';

      function DesignCanvas({ children, minScale, maxScale, style }) {
        const [state, setState] = React.useState({ sections: {}, focus: null });
        // Hold rendering until the sidecar read settles so the saved order/titles
        // appear on first paint (no source-order flash). didRead gates writes until
        // the read settles so the empty initial state can't clobber a slow read;
        // skipNextWrite suppresses the one echo-write that would otherwise follow
        // hydration.
        const [ready, setReady] = React.useState(false);
        const didRead = React.useRef(false);
        const skipNextWrite = React.useRef(false);

        React.useEffect(() => {
          let off = false;
          fetch('./' + DC_STATE_FILE)
            .then((r) => (r.ok ? r.json() : null))
            .then((saved) => {
              if (off || !saved || !saved.sections) return;
              skipNextWrite.current = true;
              setState((s) => ({ ...s, sections: saved.sections }));
            })
            .catch(() => {})
            .finally(() => {
              didRead.current = true;
              if (!off) setReady(true);
            });
          const t = setTimeout(() => {
            if (!off) setReady(true);
          }, 150);
          return () => {
            off = true;
            clearTimeout(t);
          };
        }, []);

        React.useEffect(() => {
          if (!didRead.current) return;
          if (skipNextWrite.current) {
            skipNextWrite.current = false;
            return;
          }
          const t = setTimeout(() => {
            window.omelette
              ?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections }))
              .catch(() => {});
          }, 250);
          return () => clearTimeout(t);
        }, [state.sections]);

        // Build registries synchronously from children so FocusOverlay can read
        // them in the same render. Only direct DCSection > DCArtboard children are
        // walked — wrapping them in other elements opts out of focus/reorder.
        const registry = {}; // slotId -> { sectionId, artboard }
        const sectionMeta = {}; // sectionId -> { title, subtitle, slotIds[] }
        const sectionOrder = [];
        React.Children.forEach(children, (sec) => {
          if (!sec || sec.type !== DCSection) return;
          const sid = sec.props.id ?? sec.props.title;
          if (!sid) return;
          sectionOrder.push(sid);
          const persisted = state.sections[sid] || {};
          const srcIds = [];
          React.Children.forEach(sec.props.children, (ab) => {
            if (!ab || ab.type !== DCArtboard) return;
            const aid = ab.props.id ?? ab.props.label;
            if (!aid) return;
            registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
            srcIds.push(aid);
          });
          const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
          sectionMeta[sid] = {
            title: persisted.title ?? sec.props.title,
            subtitle: sec.props.subtitle,
            slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
          };
        });

        const api = React.useMemo(
          () => ({
            state,
            section: (id) => state.sections[id] || {},
            patchSection: (id, p) =>
              setState((s) => ({
                ...s,
                sections: {
                  ...s.sections,
                  [id]: {
                    ...s.sections[id],
                    ...(typeof p === 'function' ? p(s.sections[id] || {}) : p),
                  },
                },
              })),
            setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
          }),
          [state],
        );

        // Esc exits focus; any outside pointerdown commits an in-progress rename.
        React.useEffect(() => {
          const onKey = (e) => {
            if (e.key === 'Escape') api.setFocus(null);
          };
          const onPd = (e) => {
            const ae = document.activeElement;
            if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
          };
          document.addEventListener('keydown', onKey);
          document.addEventListener('pointerdown', onPd, true);
          return () => {
            document.removeEventListener('keydown', onKey);
            document.removeEventListener('pointerdown', onPd, true);
          };
        }, [api]);

        return (
          <DCCtx.Provider value={api}>
            <DCViewport minScale={minScale} maxScale={maxScale} style={style}>
              {ready && children}
            </DCViewport>
            {state.focus && registry[state.focus] && (
              <DCFocusOverlay
                entry={registry[state.focus]}
                sectionMeta={sectionMeta}
                sectionOrder={sectionOrder}
              />
            )}
          </DCCtx.Provider>
        );
      }

      // ─────────────────────────────────────────────────────────────
      // DCViewport — transform-based pan/zoom (internal)
      //
      // Input mapping (Figma-style):
      //   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
      //   • trackpad scroll → pan    (two-finger)
      //   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
      //   • middle-drag / primary-drag-on-bg → pan
      //
      // Transform state lives in a ref and is written straight to the DOM
      // (translate3d + will-change) so wheel ticks don't go through React —
      // keeps pans at 60fps on dense canvases.
      // ─────────────────────────────────────────────────────────────
      function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
        const vpRef = React.useRef(null);
        const worldRef = React.useRef(null);
        const tf = React.useRef({ x: 0, y: 0, scale: 1 });

        const apply = React.useCallback(() => {
          const { x, y, scale } = tf.current;
          const el = worldRef.current;
          if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
        }, []);

        React.useEffect(() => {
          const vp = vpRef.current;
          if (!vp) return;

          const zoomAt = (cx, cy, factor) => {
            const r = vp.getBoundingClientRect();
            const px = cx - r.left,
              py = cy - r.top;
            const t = tf.current;
            const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
            const k = next / t.scale;
            // keep the world point under the cursor fixed
            t.x = px - (px - t.x) * k;
            t.y = py - (py - t.y) * k;
            t.scale = next;
            apply();
          };

          // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
          // line-mode deltas (Firefox) or large integer pixel deltas with no X
          // component (Chrome/Safari, typically multiples of 100/120). Trackpad
          // two-finger scroll sends small/fractional pixel deltas, often with
          // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
          const isMouseWheel = (e) =>
            e.deltaMode !== 0 ||
            (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

          const onWheel = (e) => {
            e.preventDefault();
            if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
            if (e.ctrlKey) {
              // trackpad pinch (or explicit ctrl+wheel)
              zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
            } else if (isMouseWheel(e)) {
              // notched mouse wheel — fixed-ratio step per click
              zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
            } else {
              // trackpad two-finger scroll — pan
              tf.current.x -= e.deltaX;
              tf.current.y -= e.deltaY;
              apply();
            }
          };

          // Safari sends native gesture* events for trackpad pinch with a smooth
          // e.scale; preferring these over the ctrl+wheel fallback gives a much
          // better feel there. No-ops on other browsers. Safari also fires
          // ctrlKey wheel events during the same pinch — isGesturing makes
          // onWheel drop those entirely so they neither zoom nor pan.
          let gsBase = 1;
          let isGesturing = false;
          const onGestureStart = (e) => {
            e.preventDefault();
            isGesturing = true;
            gsBase = tf.current.scale;
          };
          const onGestureChange = (e) => {
            e.preventDefault();
            zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
          };
          const onGestureEnd = (e) => {
            e.preventDefault();
            isGesturing = false;
          };

          // Drag-pan: middle button anywhere, or primary button on canvas
          // background (anything that isn't an artboard or an inline editor).
          let drag = null;
          const onPointerDown = (e) => {
            const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
            if (!(e.button === 1 || (e.button === 0 && onBg))) return;
            e.preventDefault();
            vp.setPointerCapture(e.pointerId);
            drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
            vp.style.cursor = 'grabbing';
          };
          const onPointerMove = (e) => {
            if (!drag || e.pointerId !== drag.id) return;
            tf.current.x += e.clientX - drag.lx;
            tf.current.y += e.clientY - drag.ly;
            drag.lx = e.clientX;
            drag.ly = e.clientY;
            apply();
          };
          const onPointerUp = (e) => {
            if (!drag || e.pointerId !== drag.id) return;
            vp.releasePointerCapture(e.pointerId);
            drag = null;
            vp.style.cursor = '';
          };

          vp.addEventListener('wheel', onWheel, { passive: false });
          vp.addEventListener('gesturestart', onGestureStart, { passive: false });
          vp.addEventListener('gesturechange', onGestureChange, { passive: false });
          vp.addEventListener('gestureend', onGestureEnd, { passive: false });
          vp.addEventListener('pointerdown', onPointerDown);
          vp.addEventListener('pointermove', onPointerMove);
          vp.addEventListener('pointerup', onPointerUp);
          vp.addEventListener('pointercancel', onPointerUp);
          return () => {
            vp.removeEventListener('wheel', onWheel);
            vp.removeEventListener('gesturestart', onGestureStart);
            vp.removeEventListener('gesturechange', onGestureChange);
            vp.removeEventListener('gestureend', onGestureEnd);
            vp.removeEventListener('pointerdown', onPointerDown);
            vp.removeEventListener('pointermove', onPointerMove);
            vp.removeEventListener('pointerup', onPointerUp);
            vp.removeEventListener('pointercancel', onPointerUp);
          };
        }, [apply, minScale, maxScale]);

        const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
        return (
          <div
            ref={vpRef}
            className="design-canvas"
            style={{
              height: '100vh',
              width: '100vw',
              background: DC.bg,
              overflow: 'hidden',
              overscrollBehavior: 'none',
              touchAction: 'none',
              position: 'relative',
              fontFamily: DC.font,
              boxSizing: 'border-box',
              ...style,
            }}
          >
            <div
              ref={worldRef}
              style={{
                position: 'absolute',
                top: 0,
                left: 0,
                transformOrigin: '0 0',
                willChange: 'transform',
                width: 'max-content',
                minWidth: '100%',
                minHeight: '100%',
                padding: '60px 0 80px',
              }}
            >
              <div
                style={{
                  position: 'absolute',
                  inset: -6000,
                  backgroundImage: gridSvg,
                  backgroundSize: '120px 120px',
                  pointerEvents: 'none',
                  zIndex: -1,
                }}
              />
              {children}
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────
      // DCSection — editable title + h-row of artboards in persisted order
      // ─────────────────────────────────────────────────────────────
      function DCSection({ id, title, subtitle, children, gap = 48 }) {
        const ctx = React.useContext(DCCtx);
        const sid = id ?? title;
        const all = React.Children.toArray(children);
        const artboards = all.filter((c) => c && c.type === DCArtboard);
        const rest = all.filter((c) => !(c && c.type === DCArtboard));
        const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
        const sec = (ctx && sid && ctx.section(sid)) || {};

        const order = React.useMemo(() => {
          const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
          return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
        }, [sec.order, srcOrder.join('|')]);

        const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

        return (
          <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>

                tag="div"
                value={sec.title ?? title}
                onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}

                  fontWeight: 600,

                <DCArtboardFrame
                  key={k}
                  sectionId={sid}
                  artboard={byId[k]}
                  order={order}
                  label={(sec.labels || {})[k] ?? byId[k].props.label}
                  onRename={(v) =>
                    ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))
                  }
                  onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}

        );
      }

      // DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
      function DCArtboard() {
        return null;
      }

      function DCArtboardFrame({
        sectionId,
        artboard,
        label,
        order,
        onRename,
        onReorder,
        onFocus,
      }) {
        const {
          id: rawId,
          label: rawLabel,
          width = 260,
          height = 480,
          children,
          style = {},
        } = artboard.props;
        const id = rawId ?? rawLabel;
        const ref = React.useRef(null);

        // Live drag-reorder: dragged card sticks to cursor; siblings slide into
        // their would-be slots in real time via transforms. DOM order only
        // changes on drop.
        const onGripDown = (e) => {
          e.preventDefault();
          e.stopPropagation();
          const me = ref.current;
          // translateX is applied in local (pre-scale) space but pointer deltas and
          // getBoundingClientRect().left are screen-space — divide by the viewport's
          // current scale so the dragged card tracks the cursor at any zoom level.
          const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
          const peers = Array.from(
            document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`),
          );
          const homes = peers.map((el) => ({
            el,
            id: el.dataset.dcSlot,
            x: el.getBoundingClientRect().left,
          }));
          const slotXs = homes.map((h) => h.x);
          const startIdx = order.indexOf(id);
          const startX = e.clientX;
          let liveOrder = order.slice();
          me.classList.add('dc-dragging');

          const layout = () => {
            for (const h of homes) {
              if (h.id === id) continue;
              const slot = liveOrder.indexOf(h.id);
              h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
            }
          };

          const move = (ev) => {
            const dx = ev.clientX - startX;
            me.style.transform = `translateX(${dx / scale}px)`;
            const cur = homes[startIdx].x + dx;
            let nearest = 0,
              best = Infinity;
            for (let i = 0; i < slotXs.length; i++) {
              const d = Math.abs(slotXs[i] - cur);
              if (d < best) {
                best = d;
                nearest = i;
              }
            }
            if (liveOrder.indexOf(id) !== nearest) {
              liveOrder = order.filter((k) => k !== id);
              liveOrder.splice(nearest, 0, id);
              layout();
            }
          };

          const up = () => {
            document.removeEventListener('pointermove', move);
            document.removeEventListener('pointerup', up);
            const finalSlot = liveOrder.indexOf(id);
            me.classList.remove('dc-dragging');
            me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
            // After the settle transition, kill transitions + clear transforms +
            // commit the reorder in the same frame so there's no visual snap-back.
            setTimeout(() => {
              for (const h of homes) {
                h.el.style.transition = 'none';
                h.el.style.transform = '';
              }
              if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
              requestAnimationFrame(() =>
                requestAnimationFrame(() => {
                  for (const h of homes) h.el.style.transition = '';
                }),
              );
            }, 180);
          };
          document.addEventListener('pointermove', move);
          document.addEventListener('pointerup', up);
        };

        return (
          <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
            <div
              className="dc-labelrow"
              style={{
                position: 'absolute',
                bottom: '100%',
                left: -4,
                marginBottom: 4,
                color: DC.label,
              }}
            >
              <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
                <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor">
                  <circle cx="2" cy="2" r="1.1" />
                  <circle cx="7" cy="2" r="1.1" />
                  <circle cx="2" cy="6.5" r="1.1" />
                  <circle cx="7" cy="6.5" r="1.1" />
                  <circle cx="2" cy="11" r="1.1" />
                  <circle cx="7" cy="11" r="1.1" />
                </svg>
              </div>
              <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
                <DCEditable
                  value={label}
                  onChange={onRename}
                  onClick={(e) => e.stopPropagation()}
                  style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }}
                />
              </div>
            </div>
            <button
              className="dc-expand"
              onClick={onFocus}
              onPointerDown={(e) => e.stopPropagation()}
              title="Focus"
            >
              <svg
                width="12"
                height="12"
                viewBox="0 0 12 12"
                fill="none"
                stroke="currentColor"
                strokeWidth="1.6"
                strokeLinecap="round"
              >
                <path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5" />
              </svg>
            </button>
            <div
              className="dc-card"
              style={{
                borderRadius: 2,
                boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)',
                overflow: 'hidden',
                width,
                height,
                background: '#fff',
                ...style,
              }}
            >
              {children || (
                <div
                  style={{
                    height: '100%',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    color: '#bbb',
                    fontSize: 13,
                    fontFamily: DC.font,
                  }}
                >
                  {id}
                </div>
              )}
            </div>
          </div>
        );
      }

      // Inline rename — commits on blur or Enter.
      function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
        const T = tag;
        return (
          <T
            className="dc-editable"
            contentEditable
            suppressContentEditableWarning
            onClick={onClick}
            onPointerDown={(e) => e.stopPropagation()}
            onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
            onKeyDown={(e) => {
              if (e.key === 'Enter') {
                e.preventDefault();
                e.currentTarget.blur();
              }
            }}
            style={style}
          >
            {value}
          </T>
        );
      }

      // ─────────────────────────────────────────────────────────────
      // Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across

      // ─────────────────────────────────────────────────────────────
      function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
        const ctx = React.useContext(DCCtx);
        const { sectionId, artboard } = entry;
        const sec = ctx.section(sectionId);
        const meta = sectionMeta[sectionId];
        const peers = meta.slotIds;
        const aid = artboard.props.id ?? artboard.props.label;
        const idx = peers.indexOf(aid);
        const secIdx = sectionOrder.indexOf(sectionId);

        const go = (d) => {
          const n = peers[(idx + d + peers.length) % peers.length];
          if (n) ctx.setFocus(`${sectionId}/${n}`);
        };
        const goSection = (d) => {
          const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
          const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
          if (first) ctx.setFocus(`${ns}/${first}`);
        };

        React.useEffect(() => {
          const k = (e) => {
            if (e.key === 'ArrowLeft') {
              e.preventDefault();
              go(-1);
            }
            if (e.key === 'ArrowRight') {
              e.preventDefault();
              go(1);
            }
            if (e.key === 'ArrowUp') {
              e.preventDefault();
              goSection(-1);
            }
            if (e.key === 'ArrowDown') {
              e.preventDefault();
              goSection(1);
            }
          };
          document.addEventListener('keydown', k);
          return () => document.removeEventListener('keydown', k);
        });

        const { width = 260, height = 480, children } = artboard.props;
        const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
        React.useEffect(() => {
          const r = () => setVp({ w: window.innerWidth, h: window.innerHeight });
          window.addEventListener('resize', r);
          return () => window.removeEventListener('resize', r);
        }, []);
        const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

        const [ddOpen, setDd] = React.useState(false);
        const Arrow = ({ dir, onClick }) => (
          <button
            onClick={(e) => {
              e.stopPropagation();
              onClick();
            }}
            style={{
              position: 'absolute',
              top: '50%',
              [dir]: 28,
              transform: 'translateY(-50%)',
              border: 'none',
              background: 'rgba(255,255,255,.08)',
              color: 'rgba(255,255,255,.9)',
              width: 44,
              height: 44,
              borderRadius: 22,
              fontSize: 18,
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              transition: 'background .15s',
            }}
            onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
            onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
              stroke="currentColor"
              strokeWidth="2"
              strokeLinecap="round"
            >
              <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} />
            </svg>
          </button>
        );

        // Portal to body so position:fixed is the real viewport regardless of any
        // transform on DesignCanvas's ancestors (including the canvas zoom itself).
        return ReactDOM.createPortal(
          <div
            onClick={() => ctx.setFocus(null)}
            onWheel={(e) => e.preventDefault()}
            style={{
              position: 'fixed',
              inset: 0,
              zIndex: 100,
              background: 'rgba(24,20,16,.6)',
              backdropFilter: 'blur(14px)',
              fontFamily: DC.font,
              color: '#fff',
            }}
          >
            {/* top bar: section dropdown (left) · close (right) */}
            <div
              onClick={(e) => e.stopPropagation()}
              style={{
                position: 'absolute',
                top: 0,
                left: 0,
                right: 0,
                height: 72,
                display: 'flex',
                alignItems: 'flex-start',
                padding: '16px 20px 0',
                gap: 16,
              }}
            >
              <div style={{ position: 'relative' }}>
                <button
                  onClick={() => setDd((o) => !o)}
                  style={{
                    border: 'none',
                    background: 'transparent',
                    color: '#fff',
                    cursor: 'pointer',
                    padding: '6px 8px',
                    borderRadius: 6,
                    textAlign: 'left',
                    fontFamily: 'inherit',
                  }}
                >
                  <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>
                      {meta.title}
                    </span>
                    <svg
                      width="11"
                      height="11"
                      viewBox="0 0 11 11"
                      fill="none"
                      stroke="currentColor"
                      strokeWidth="1.8"
                      strokeLinecap="round"
                      style={{ opacity: 0.7 }}
                    >
                      <path d="M2 4l3.5 3.5L9 4" />
                    </svg>
                  </span>
                  {meta.subtitle && (
                    <span
                      style={{
                        display: 'block',
                        fontSize: 13,
                        opacity: 0.6,
                        fontWeight: 400,
                        marginTop: 2,
                      }}
                    >
                      {meta.subtitle}
                    </span>
                  )}
                </button>
                {ddOpen && (
                  <div
                    style={{
                      position: 'absolute',
                      top: '100%',
                      left: 0,
                      marginTop: 4,
                      background: '#2a251f',
                      borderRadius: 8,
                      boxShadow: '0 8px 32px rgba(0,0,0,.4)',
                      padding: 4,
                      minWidth: 200,
                      zIndex: 10,
                    }}
                  >
                    {sectionOrder.map((sid) => (
                      <button
                        key={sid}
                        onClick={() => {
                          setDd(false);
                          const f = sectionMeta[sid].slotIds[0];
                          if (f) ctx.setFocus(`${sid}/${f}`);
                        }}
                        style={{
                          display: 'block',
                          width: '100%',
                          textAlign: 'left',
                          border: 'none',
                          cursor: 'pointer',
                          background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent',
                          color: '#fff',
                          padding: '8px 12px',
                          borderRadius: 5,
                          fontSize: 14,
                          fontWeight: sid === sectionId ? 600 : 400,
                          fontFamily: 'inherit',
                        }}
                      >
                        {sectionMeta[sid].title}
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <div style={{ flex: 1 }} />
              <button
                onClick={() => ctx.setFocus(null)}
                onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
                onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
                style={{
                  border: 'none',
                  background: 'transparent',
                  color: 'rgba(255,255,255,.7)',
                  width: 32,
                  height: 32,
                  borderRadius: 16,
                  fontSize: 20,
                  cursor: 'pointer',
                  lineHeight: 1,
                  transition: 'background .12s',
                }}
              >
                ×
              </button>
            </div>

            {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
            <div
              style={{
                position: 'absolute',
                top: 64,
                bottom: 56,
                left: 100,
                right: 100,
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                justifyContent: 'center',
                gap: 16,
              }}
            >
              <div
                onClick={(e) => e.stopPropagation()}
                style={{ width: width * scale, height: height * scale, position: 'relative' }}
              >
                <div
                  style={{
                    width,
                    height,
                    transform: `scale(${scale})`,
                    transformOrigin: 'top left',
                    background: '#fff',
                    borderRadius: 2,
                    overflow: 'hidden',
                    boxShadow: '0 20px 80px rgba(0,0,0,.4)',
                  }}
                >
                  {children || (
                    <div
                      style={{
                        height: '100%',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        color: '#bbb',
                      }}
                    >
                      {aid}
                    </div>
                  )}
                </div>
              </div>
              <div
                onClick={(e) => e.stopPropagation()}
                style={{ fontSize: 14, fontWeight: 500, opacity: 0.85, textAlign: 'center' }}
              >
                {(sec.labels || {})[aid] ?? artboard.props.label}
                <span style={{ opacity: 0.5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>
                  {idx + 1} / {peers.length}
                </span>
              </div>
            </div>

            <Arrow dir="left" onClick={() => go(-1)} />
            <Arrow dir="right" onClick={() => go(1)} />

            {/* dots */}
            <div
              onClick={(e) => e.stopPropagation()}
              style={{
                position: 'absolute',
                bottom: 20,
                left: '50%',
                transform: 'translateX(-50%)',
                display: 'flex',
                gap: 8,
              }}
            >
              {peers.map((p, i) => (
                <button
                  key={p}
                  onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
                  style={{
                    border: 'none',
                    padding: 0,
                    cursor: 'pointer',
                    width: 6,
                    height: 6,
                    borderRadius: 3,
                    background: i === idx ? '#fff' : 'rgba(255,255,255,.3)',
                  }}
                />
              ))}
            </div>
          </div>,
          document.body,
        );
      }

      // ─────────────────────────────────────────────────────────────
      // Post-it — absolute-positioned sticky note
      // ─────────────────────────────────────────────────────────────
      function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
        return (
          <div
            style={{
              position: 'absolute',
              top,
              left,
              right,
              bottom,
              width,
              background: DC.postitBg,
              padding: '14px 16px',
              fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
              fontSize: 14,
              lineHeight: 1.4,
              color: DC.postitText,
              boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
              transform: `rotate(${rotate}deg)`,
              zIndex: 5,
            }}
          >
            {children}
          </div>
        );
      }

      Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });
    </script>

      // ─────────────────────────────────────────────────────────────

      // Single source of truth for tweak values. setTweak persists via the host
      // (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
      function useTweaks(defaults) {
        const [values, setValues] = React.useState(defaults);
        // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
        // useState-style call doesn't write a "[object Object]" key into the persisted
        // JSON block.
        const setTweak = React.useCallback((keyOrEdits, val) => {
          const edits =
            typeof keyOrEdits === 'object' && keyOrEdits !== null
              ? keyOrEdits
              : { [keyOrEdits]: val };
          setValues((prev) => ({ ...prev, ...edits }));
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
        }, []);
        return [values, setTweak];

      // before our handler exists and the toolbar toggle would silently no-op.

          if (!panel) return;

            h = panel.offsetHeight;
          const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
          const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);

            x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
            y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),

      function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {

        TweakToggle,
        TweakRadio,

                    <stop offset="100%" stopColor={accent || 'var(--k-maint)'} stopOpacity="0" />

                    x1="0"
                    y1={h - (g / 100) * (h - 6) - 3}
                    x2={w}
                    y2={h - (g / 100) * (h - 6) - 3}
                    stroke="var(--k-line)"

                <path
                  d={`M0,${h - 3} L ${points.split(' ').join(' L ')} L ${w},${h - 3} Z`}
                  fill="url(#ga)"

                <polyline
                  points={points}
                  fill="none"
                  stroke={accent || 'var(--k-maint)'}
                  strokeWidth="1.6"
                />

                  (v, i) =>

                        key={i}
                        cx={i * dx}
                        cy={h - (v / max) * (h - 6) - 3}
                        r="2.4"
                        fill={v === 0 ? 'var(--k-rescue)' : 'var(--k-amber)'}
                      />

      function MobSpark({ data, accent, kind = 'area', label }) {
        const w = 320,
          h = 64;
        const max = kind === 'area' ? 100 : Math.max(...data, 1);
        const dx = w / (data.length - 1);
        const ac = accent || 'var(--k-maint)';
        return (
          <div>
            <div
              style={{
                fontSize: 10,
                color: 'var(--k-ink-3)',
                textTransform: 'uppercase',
                letterSpacing: '0.06em',
                fontWeight: 600,
                marginBottom: 6,
              }}
            >
              {label}
            </div>
            <svg
              width="100%"
              height={h}
              viewBox={`0 0 ${w} ${h}`}
              preserveAspectRatio="none"
              style={{ display: 'block' }}
            >
              {kind === 'area' ? (
                <React.Fragment>
                  <defs>
                    <linearGradient id={`mga-${kind}`} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={ac} stopOpacity="0.28" />
                      <stop offset="100%" stopColor={ac} stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  {[0, 50, 100].map((g, i) => (
                    <line
                      key={i}
                      x1="0"
                      y1={h - (g / 100) * (h - 4) - 2}
                      x2={w}
                      y2={h - (g / 100) * (h - 4) - 2}
                      stroke="var(--k-line)"
                      strokeWidth="0.5"
                      strokeDasharray={g === 100 ? '' : '2 3'}
                      opacity={g === 100 ? 1 : 0.5}
                    />
                  ))}
                  <path
                    d={`M0,${h - 2} ${data.map((v, i) => `L${i * dx},${h - (v / max) * (h - 4) - 2}`).join(' ')} L${w},${h - 2} Z`}
                    fill={`url(#mga-${kind})`}
                  />
                  <polyline
                    points={data
                      .map((v, i) => `${i * dx},${h - (v / max) * (h - 4) - 2}`)
                      .join(' ')}
                    fill="none"
                    stroke={ac}
                    strokeWidth="1.5"
                  />
                  {data.map(
                    (v, i) =>
                      v < 100 && (
                        <circle
                          key={i}
                          cx={i * dx}
                          cy={h - (v / max) * (h - 4) - 2}
                          r="2"
                          fill={v === 0 ? 'var(--k-rescue)' : 'var(--k-amber)'}
                        />
                      ),
                  )}
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <line
                    x1="0"
                    y1={h - 0.5}
                    x2={w}
                    y2={h - 0.5}
                    stroke="var(--k-line)"
                    strokeWidth="0.5"
                  />
                  {data.map((v, i) => {
                    const bw = w / data.length - 1.5;
                    const bh = (v / max) * (h - 4);
                    const x = i * (bw + 1.5);
                    return v > 0 ? (
                      <rect
                        key={i}
                        x={x}
                        y={h - bh - 0.5}
                        width={bw}
                        height={bh}
                        rx="1"
                        fill="var(--k-rescue)"
                      />
                    ) : (
                      <rect
                        key={i}
                        x={x}
                        y={h - 1}
                        width={bw}
                        height="1"
                        rx="0.4"
                        fill="var(--k-line-strong)"
                      />
                    );
                  })}
                </React.Fragment>
              )}
            </svg>
          </div>
        );
      }

                    </BrowserChrome>
                  </DCArtboard>
                  <DCArtboard id="ios" label="iOS · 402x874" width={402} height={874}>
                    <IOSDevice width={402} height={874} dark={t.dark}>
                      <ShareViewMobile {...props} platform="ios" />
                    </IOSDevice>
                  </DCArtboard>
                  <DCArtboard id="android" label="Android · 412x917" width={412} height={917}>
                    <AndroidDevice width={412} height={917} dark={t.dark}>
                      <ShareViewMobile {...props} platform="android" />
                    </AndroidDevice>
                  </DCArtboard>
                </DCSection>
              </DesignCanvas>

              <TweaksPanel title="Partage tweaks">
                <TweakSection label="Form" />
                <TweakRadio
                  label="Density"
                  value={t.density}
                  options={[
                    { value: 'compact', label: 'Compact' },
                    { value: 'regular', label: 'Regular' },
                    { value: 'roomy', label: 'Roomy' },
                  ]}
                  onChange={(v) => setTweak('density', v)}
                />
                <TweakSelect
                  label="Type pairing"
                  value={t.type}
                  options={[
                    { value: 'grotesk', label: 'Inter Tight + Inter' },
                    { value: 'serif', label: 'Source Serif + Inter' },
                    { value: 'humanist', label: 'DM Sans' },
                  ]}
                  onChange={(v) => setTweak('type', v)}
                />
                <TweakSection label="Theme" />
                <TweakColor
                  label="Accent"
                  value={t.accent}
                  onChange={(v) => setTweak('accent', v)}
                />
                <TweakToggle
                  label="Dark mode"
                  value={t.dark}
                  onChange={(v) => setTweak('dark', v)}
                />
              </TweaksPanel>
            </React.Fragment>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      }

      (function waitAndStart() {
        const need = [
          'useTweaks',
          'TweaksPanel',
          'TweakRadio',
          'TweakSelect',
          'TweakColor',
          'TweakToggle',
          'TweakSection',
          'ShareView',
          'ShareViewMobile',
          'BrowserChrome',
          'IOSDevice',
          'AndroidDevice',
          'DesignCanvas',
          'DCSection',
          'DCArtboard',
        ];
        if (need.every((n) => window[n])) return __kStart();
        setTimeout(waitAndStart, 30);
      })();
    </script>
  </body>
</html>
